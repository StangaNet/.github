name: .NET Library CI (Reusable)

# Reusable workflow for StangaNet .NET library repositories.
# Call from any library repo's own workflow:
#
#   jobs:
#     ci:
#       uses: StangaNet/.github/workflows/dotnet-lib.yml@main
#       with:
#         library-name: 'StangaNetLib.Auth'
#         artifact-name: 'stanganetlib-auth-nuget'

on:
  workflow_call:
    inputs:
      library-name:
        description: Library name matching the csproj (e.g. StangaNetLib.Auth)
        type: string
        required: true
      artifact-name:
        description: Artifact name for the uploaded NuGet package (e.g. stanganetlib-auth-nuget)
        type: string
        required: true
      needs-github-packages-source:
        description: Add the StangaNet GitHub Packages NuGet source (required when the library depends on other StangaNet packages)
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj*', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Add GitHub Packages Source
        if: ${{ inputs.needs-github-packages-source }}
        run: dotnet nuget add source "https://nuget.pkg.github.com/StangaNet/index.json" --name github --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Create NuGet Package
        run: dotnet pack src/${{ inputs.library-name }}/${{ inputs.library-name }}.csproj --configuration Release --no-build --output ./nupkg

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate

      - name: Upload NuGet Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./nupkg/*.nupkg
          if-no-files-found: error
