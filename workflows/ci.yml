name: CI — Node.js (Reusable)

# Reusable workflow for Node.js repositories.
# Call from any Node.js repository in the org:
#
#   jobs:
#     ci:
#       uses: StangaNet/.github/workflows/ci.yml@main
#       with:
#         node-version: '20'
#
# For .NET library repositories use dotnet-lib.yml instead.

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: '20'
      working-directory:
        description: Working directory for npm commands
        type: string
        default: '.'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
