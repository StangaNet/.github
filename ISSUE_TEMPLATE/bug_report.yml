name: Bug Report
description: Report a reproducible bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, browser, or any other relevant environment details.
      placeholder: |
        - OS: Windows 11 / macOS 14 / Ubuntu 24
        - Runtime: .NET 9.0 / Node 20 / Python 3.12 / ...
        - Package version (if applicable): 1.0.0
        - Browser (if applicable): Chrome 123
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that might help.
    validations:
      required: false
